name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x scripts/setup-minikube.sh
          chmod +x scripts/deploy.sh

      - name: Prepare local Kubernetes environment
        run: |
          ./scripts/setup-minikube.sh

      - name: Deploy application to local Kubernetes cluster
        run: |
          ./scripts/deploy.sh

      - name: Verify deployment
        run: |
          kubectl get nodes
          kubectl get pods
          kubectl get svc
          kubectl get ingress
          curl -H "Host: datetime.local" http://$(minikube ip)

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag image for Docker Hub
        run: |
          docker tag datetime-app:v1 ${{ secrets.DOCKERHUB_USERNAME }}/datetime-app:latest
          docker tag datetime-app:v1 ${{ secrets.DOCKERHUB_USERNAME }}/datetime-app:${{ github.sha }}

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/datetime-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/datetime-app:${{ github.sha }}
